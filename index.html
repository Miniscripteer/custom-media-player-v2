<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Media Player</title>
  <link rel="stylesheet" href="style.css"/>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>
<body class="light">
  <header>
    <h1>Custom Media Player Remake</h1>
    <input type="file" id="upload-tracks" multiple accept="audio/*" />
    <input type="file" id="upload-folder" webkitdirectory directory multiple accept="audio/*" title="Upload Folder for Album/CD" />
    <button id="theme-toggle">Toggle Light/Dark</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="now-playing">Now Playing</button>
    <button class="tab-btn" data-tab="library">Library</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </nav>

  <main>
    <section id="now-playing" class="tab-content active">
      <div class="now-playing-container">
        <img id="artist-pfp" src="https://via.placeholder.com/150?text=Artist" alt="Artist"/>
        <h2 id="track-title">No track selected</h2>
        <p id="album-info">Album: N/A</p>
        <canvas id="visualization" width="300" height="100"></canvas>
        <div id="progress-container"><progress id="progress" value="0" max="100"></progress></div>
        <div id="controls">
          <button id="prev">⏮ Prev</button>
          <button id="play-pause">▶️ Play</button>
          <button id="next">⏭ Next</button>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="1"/>
        </div>
      </div>
    </section>

    <section id="library" class="tab-content">
      <h3>Library</h3>
      <div id="library-groups" class="album-grid">

      </div>
      <ul id="track-list"></ul> 
    </section>

    <section id="settings" class="tab-content">
      <h3>Customize</h3>
      <label>Gradient Start: <input type="color" id="grad-start" value="#ff7e5f"/></label>
      <label>Gradient End: <input type="color" id="grad-end" value="#feb47b"/></label>
      <button id="apply-gradient">Apply Gradient</button>
      <br><br>
      <h4>Artist PFPs</h4>
      <div id="artist-pfps">

      </div>
      <br>
      <h4>Playlists</h4>
      <button id="create-playlist">Create New Playlist</button>
      <div id="playlists">
      </div>
      <br>
      <button id="clear-library">Eject/Clear All</button>
    </section>
  </main>


  <div id="album-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3 id="modal-title">Album Details</h3>
      <img id="modal-cover" src="https://via.placeholder.com/200?text=Cover" alt="Album Cover" />
      <button id="play-album">Play Album</button>
      <button id="edit-album">Edit Info</button>
      <ul id="modal-tracks"></ul>
      \
      <form id="edit-form" style="display:none;">
        <label>Album Name: <input type="text" id="edit-album-name"></label>
        <label>Artist Name: <input type="text" id="edit-artist-name"></label>
        <label>Genre: <input type="text" id="edit-genre"></label>
        <label>Year: <input type="text" id="edit-year"></label>
        <label>Album Cover: <input type="file" id="edit-cover" accept="image/*"></label>
        <div id="edit-tracks"></div>
        <button type="button" id="save-edit">Save</button>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
